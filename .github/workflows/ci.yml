name: CI — Trading Bot

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-lint:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      # 1 ── Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2 ── Setup Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3 ── Cache pip dependencies
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4 ── Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 5 ── Syntax check all Python files
      - name: Syntax check (py_compile)
        run: |
          python -m py_compile bot/__init__.py
          python -m py_compile bot/client.py
          python -m py_compile bot/orders.py
          python -m py_compile bot/validators.py
          python -m py_compile bot/logging_config.py
          python -m py_compile bot/enhanced_cli.py
          python -m py_compile cli.py
          python -m py_compile app.py
          echo "✅ All files compile cleanly"

      # 6 ── Run tests
      - name: Run pytest
        run: |
          pytest tests/ -v --tb=short
